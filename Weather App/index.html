<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App - SkyCast</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            min-height: 100vh;
            color: #fff;
        }
        .navbar {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }
        .navbar-brand, .nav-link {
            color: #fff ;
            font-weight: 600;
        }
        .weather-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 40px;
            margin: 50px auto;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
        }
        .search-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            padding: 5px 5px 5px 20px;
            margin-bottom: 30px;
        }
        .search-container input {
            border: none;
            outline: none;
            background: transparent;
            color: #fff;
            font-size: 1.1rem;
            width: 80%;
        }
        .search-container input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }
        .search-container button {
            border: none;
            outline: none;
            background: #fff;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            transition: 0.3s;
        }
        .search-container button:hover {
            background: #4facfe;
            color: #fff;
        }
        .weather-icon {
            width: 150px;
            margin-top: 20px;
        }
        .temp {
            font-size: 4.5rem;
            font-weight: 600;
            margin-top: -10px;
        }
        .city {
            font-size: 2.2rem;
            font-weight: 400;
            margin-top: -10px;
        }
        .details {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            margin-top: 40px;
        }
        .col {
            display: flex;
            align-items: center;
            text-align: left;
        }
        .col i {
            font-size: 2rem;
            margin-right: 15px;
        }
        .humidity, .wind {
            font-size: 1.3rem;
            margin-bottom: -5px;
            font-weight: 600;
        }
        .error {
            text-align: left;
            margin-left: 10px;
            font-size: 0.9rem;
            display: none;
            color: #ff4d4d;
            font-weight: 600;
        }
        .Weather {
            display: none;
        }
        footer {
            background: rgba(0, 0, 0, 0.1);
            padding: 30px 0;
            margin-top: auto;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="home.html"><i class="fas fa-cloud-sun me-2"></i>SkyCast</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="home.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="index.html">Weather App</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="login.html">Login</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="signup.html">Sign Up</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="weather-card">
            <div class="search-container">
                <input type="text" placeholder="Enter city name" spellcheck="false">
                <button><i class="fas fa-search"></i></button>
            </div>

            <div class="error">
                <p><i class="fas fa-exclamation-circle me-2"></i>Invalid city name</p>
            </div>

            <div class="Weather">
                <img src="https://openweathermap.org/img/wn/10d@4x.png" class="weather-icon">
                <h1 class="temp">22°C</h1>
                <h2 class="city">Amman</h2>
                <div class="details">
                    <div class="col">
                        <i class="fas fa-droplet"></i>
                        <div>
                            <p class="humidity">50%</p>
                            <p class="mb-0 small">Humidity</p>
                        </div>
                    </div>
                    <div class="col">
                        <i class="fas fa-wind"></i>
                        <div>
                            <p class="wind">15km/h</p>
                            <p class="mb-0 small">Wind Speed</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center">
        <div class="container">
            <p class="mb-0">&copy; 2026 SkyCast Weather. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const APIKEY = "67a525884355f69be4ca775f3cf68cec";
        const APIURL = "https://api.openweathermap.org/data/2.5/weather?units=metric&q=";

        const searchBox = document.querySelector(".search-container input");
        const searchBtn = document.querySelector(".search-container button");
        const weatherIcon = document.querySelector(".weather-icon");

        async function checkWeather(city) {
            try {
                const response = await fetch(APIURL + city + `&appid=${APIKEY}`);

                if (response.status == 404) {
                    document.querySelector(".error").style.display = "block";
                    document.querySelector(".Weather").style.display = "none";
                } else {
                    var data = await response.json();

                    document.querySelector(".city").innerHTML = data.name;
                    document.querySelector(".temp").innerHTML = Math.round(data.main.temp) + "°C";
                    document.querySelector(".humidity").innerHTML = data.main.humidity + "%";
                    document.querySelector(".wind").innerHTML = data.wind.speed + " km/h";

                    const iconCode = data.weather[0].icon;
                    weatherIcon.src = `https://openweathermap.org/img/wn/${iconCode}@4x.png`;

                    document.querySelector(".Weather").style.display = "block";
                    document.querySelector(".error").style.display = "none";
                }
            } catch (error) {
                console.error("Error fetching weather data:", error);
            }
        }

        searchBtn.addEventListener("click", () => {
            if (searchBox.value.trim() !== "") {
                checkWeather(searchBox.value);
            }
        });

        searchBox.addEventListener("keypress", (e) => {
            if (e.key === "Enter" && searchBox.value.trim() !== "") {
                checkWeather(searchBox.value);
            }
        });
    </script>
</body>
</html>
